<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" role="img"
     aria-label="Placeholder: 20-second Sentinel demo">
  <style>
    .bg    { fill: #0a0e14; }
    .card  { fill: #111827; }
    .ok    { fill: #34d399; }
    .dim   { fill: #6b7280; }
    .warn  { fill: #f59e0b; }
    .text  { fill: #e5e7eb; font-family: "SF Mono","JetBrains Mono",ui-monospace,monospace; font-size: 14px; }
    .h1    { fill: #e5e7eb; font-family: "Inter","SF Pro",system-ui,sans-serif; font-size: 20px; font-weight: 700; }
    .h2    { fill: #9ca3af; font-family: "Inter","SF Pro",system-ui,sans-serif; font-size: 13px; }
    .hint  { fill: #6b7280; font-family: "Inter","SF Pro",system-ui,sans-serif; font-size: 11px; }
    .frame { fill: none; stroke: #1f2937; stroke-width: 1; }
    .pill  { fill: #1a2332; stroke: #1f2937; }
  </style>

  <rect class="bg" width="760" height="360" rx="6"/>
  <rect class="card" x="24" y="24" width="712" height="312" rx="6" />
  <rect class="frame" x="24" y="24" width="712" height="312" rx="6" />

  <text class="h1" x="42" y="60">sentinel demo</text>
  <text class="h2" x="42" y="82">defence logistics · 10 decisions · 3 blocked</text>

  <rect class="pill" x="42" y="102" width="82" height="22" rx="4"/>
  <text class="text ok" x="54" y="118" style="font-size:12px">ALLOW · 7</text>

  <rect class="pill" x="132" y="102" width="100" height="22" rx="4"/>
  <text class="text" x="144" y="118" style="fill:#f87171;font-size:12px">BLOCKED · 3</text>

  <rect class="pill" x="240" y="102" width="160" height="22" rx="4"/>
  <text class="text" x="252" y="118" style="font-size:12px">€1,260,000 halted</text>

  <text class="text" x="42" y="162">[04/10] High-value dual-use electronics export  €890,000  </text>
  <text class="text" x="544" y="162" style="fill:#f87171">BLOCKED</text>
  <text class="text dim" x="64" y="180" style="font-size:12px">└─ rule=export_control_hard_cap  halted before execution</text>

  <text class="text" x="42" y="208">[07/10] Encrypted comms equipment (dual-use)    €220,000  </text>
  <text class="text" x="544" y="208" style="fill:#f87171">BLOCKED</text>
  <text class="text dim" x="64" y="226" style="font-size:12px">└─ rule=dual_use_review_required  halted before execution</text>

  <text class="text ok" x="42" y="264">✓ Privacy: inputs/outputs stored as SHA-256 hashes</text>
  <text class="text ok" x="42" y="282">✓ Report: sentinel_demo_report.html (self-contained)</text>
  <text class="text ok" x="42" y="300">✓ Next:   sentinel audit-gap    sentinel evidence-pack</text>

  <text class="hint" x="42" y="326">Placeholder graphic. Replace with a real screencast: scripts/regen_demo_gif.sh</text>
