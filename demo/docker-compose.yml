name: sentinel-demo

services:

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.95.0
    container_name: sentinel-otel
    restart: unless-stopped
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus metrics exporter
      - "13133:13133" # Health check extension
    volumes:
      - "./otel-config.yaml:/etc/otelcol-contrib/config.yaml:ro"
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:13133"]
      interval: 10s
      timeout: 5s
      retries: 3

  langfuse-db:
    image: postgres:15.6-alpine
    container_name: sentinel-langfuse-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: langfuse
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
    volumes:
      - langfuse-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 10s
      timeout: 5s
      retries: 5

  langfuse:
    image: langfuse/langfuse:2.77.2
    container_name: sentinel-langfuse
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      langfuse-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      NEXTAUTH_SECRET: demo-only-do-not-use-in-production
      NEXTAUTH_URL: http://localhost:3000
      SALT: demo-only-do-not-use-in-production

  prometheus:
    image: prom/prometheus:v2.49.1
    container_name: sentinel-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    depends_on:
      - node-exporter
    volumes:
      - "./prometheus.yml:/etc/prometheus/prometheus.yml:ro"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3

  # node-exporter reads sentinel's .prom files from the shared
  # sentinel-metrics volume via its textfile collector. This is how
  # the Grafana dashboard gets sovereignty_score / days_to_enforcement
  # / kill_switch_active / decisions_total / latency percentiles.
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: sentinel-node-exporter
    restart: unless-stopped
    command:
      - '--collector.textfile.directory=/var/lib/sentinel-metrics'
      - '--collector.disable-defaults'
      - '--collector.textfile'
    volumes:
      - sentinel-metrics:/var/lib/sentinel-metrics:ro

  grafana:
    image: grafana/grafana:10.3.3
    container_name: sentinel-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    depends_on:
      prometheus:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: sentinel
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - "./grafana/provisioning:/etc/grafana/provisioning:ro"
      - "./grafana/dashboards:/var/lib/grafana/dashboards:ro"
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  sentinel-demo:
    build:
      context: ..
      dockerfile: demo/Dockerfile
    container_name: sentinel-demo-app
    restart: unless-stopped
    depends_on:
      otel-collector:
        condition: service_healthy
    environment:
      OTEL_ENDPOINT: http://otel-collector:4317
      SENTINEL_PROJECT: sentinel-demo
      SENTINEL_PROM_TEXTFILE: /var/lib/sentinel-metrics/sentinel.prom
    volumes:
      - sentinel-metrics:/var/lib/sentinel-metrics
    command: ["python", "-u", "/app/demo/demo_app.py"]

volumes:
  langfuse-db-data:
  sentinel-metrics:
