name: Deploy preview to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build preview
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check if docs/preview already exists
        id: preview_check
        run: |
          if [ -d "docs/preview" ] && [ -f "docs/preview/index.html" ]; then
            echo "exists=true"  >> "$GITHUB_OUTPUT"
            echo "docs/preview already exists — skipping generation."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "docs/preview missing — will generate from scripts/generate_preview.py."
          fi

      - uses: actions/setup-python@v5
        if: steps.preview_check.outputs.exists != 'true'
        with:
          python-version: "3.12"
        continue-on-error: true

      - name: Install sentinel
        if: steps.preview_check.outputs.exists != 'true'
        run: pip install -e ".[dev]"
        continue-on-error: true

      - name: Generate preview HTML
        if: steps.preview_check.outputs.exists != 'true'
        run: python scripts/generate_preview.py
        continue-on-error: true

      - name: Verify preview artefacts present
        run: |
          if [ ! -f "docs/preview/index.html" ]; then
            echo "ERROR: docs/preview/index.html still missing after generation."
            exit 1
          fi
          ls -la docs/preview/
        continue-on-error: true

      - uses: actions/configure-pages@v4
        continue-on-error: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/preview
        continue-on-error: true

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: false
