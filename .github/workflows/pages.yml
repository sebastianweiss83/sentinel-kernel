name: Deploy preview to GitHub Pages

# Pages deployment now happens inside ci.yml's `sync-all` +
# `deploy-pages` jobs, so the deployed content is always in lockstep
# with the synced derived content. This file is retained only for
# manual workflow_dispatch (e.g. re-deploying an older ref) and
# deliberately does nothing on push events.

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  manual-deploy:
    name: Manually deploy docs/preview
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Regenerate preview
        run: python scripts/sync_all.py --skip-preview=false

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/preview

      - id: deployment
        uses: actions/deploy-pages@v4
