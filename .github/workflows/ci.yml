name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --cov=sentinel --cov-report=term-missing --cov-fail-under=75

  sovereignty-check:
    name: Sovereignty checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Check no US-owned deps in critical path
        run: python scripts/check_sovereignty.py

      - name: Verify EU AI Act mandatory trace fields present
        run: pytest tests/test_eu_ai_act_fields.py -v

      - name: Verify trace schema stability
        run: pytest tests/test_trace_schema.py -v

  lint:
    name: Lint & type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: ruff check sentinel/ tests/ scripts/
      - run: mypy sentinel/ --ignore-missing-imports

  quickstart:
    name: Quickstart smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .
      - run: pip install ruff pytest pytest-asyncio pytest-cov
      - run: python examples/01_minimal_trace.py
      - run: python examples/03_policy_simple_rule.py
      - run: python examples/smoke_test.py

  airgap:
    name: Air-gapped validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Run air-gapped tests
        run: pytest tests/test_airgap.py -v
        env:
          SENTINEL_AIRGAP: "1"

  update-claude-md:
    # Rewrites the auto-generated block in CLAUDE.md with the current
    # repo state after every successful push to main. Runs only after
    # the full test matrix is green. Uses `[skip ci]` in the commit
    # message so the self-commit does not re-trigger the workflow.
    name: Auto-update CLAUDE.md
    runs-on: ubuntu-latest
    needs: [test, sovereignty-check, lint, quickstart, airgap]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Rewrite CLAUDE.md auto-generated block
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/update_claude_md.py

      - name: Commit if changed
        run: |
          if git diff --quiet CLAUDE.md; then
            echo "CLAUDE.md is already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CLAUDE.md
          git commit -m "chore(auto): refresh CLAUDE.md state block [skip ci]"
          # Retry with rebase to survive races where another commit landed
          # between checkout and push.
          for i in 1 2 3; do
            if git push origin HEAD:main; then
              echo "Pushed on attempt $i"
              exit 0
            fi
            echo "Push rejected on attempt $i; rebasing and retrying."
            git fetch origin main
            git rebase origin/main || {
              echo "Rebase failed — aborting."
              git rebase --abort || true
              exit 1
            }
          done
          echo "Push still failing after retries — giving up."
          exit 1
