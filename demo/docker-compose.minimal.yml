name: sentinel-demo-minimal

# Minimal stack — starts in <60 seconds.
# SQLite-backed sentinel demo + OTel + Prometheus + Grafana.
# No PostgreSQL, no LangFuse. For full stack use docker-compose.yml.

services:

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.95.0
    container_name: sentinel-min-otel
    restart: unless-stopped
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
      - "13133:13133"
    volumes:
      - "./otel-config.yaml:/etc/otelcol-contrib/config.yaml:ro"
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:13133"]
      interval: 5s
      timeout: 3s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.49.1
    container_name: sentinel-min-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    depends_on:
      - node-exporter
    volumes:
      - "./prometheus.yml:/etc/prometheus/prometheus.yml:ro"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Textfile collector — reads Sentinel's .prom files from the shared
  # sentinel-metrics volume and exposes them to Prometheus.
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: sentinel-min-node-exporter
    restart: unless-stopped
    command:
      - '--collector.textfile.directory=/var/lib/sentinel-metrics'
      - '--collector.disable-defaults'
      - '--collector.textfile'
    volumes:
      - sentinel-metrics:/var/lib/sentinel-metrics:ro

  grafana:
    image: grafana/grafana:10.3.3
    container_name: sentinel-min-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    depends_on:
      prometheus:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: sentinel
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - "./grafana/provisioning:/etc/grafana/provisioning:ro"
      - "./grafana/dashboards:/var/lib/grafana/dashboards:ro"
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  sentinel-demo:
    build:
      context: ..
      dockerfile: demo/Dockerfile
    container_name: sentinel-min-demo
    restart: unless-stopped
    depends_on:
      otel-collector:
        condition: service_healthy
    environment:
      OTEL_ENDPOINT: http://otel-collector:4317
      SENTINEL_PROJECT: sentinel-demo-minimal
      SENTINEL_STORAGE: sqlite
      SENTINEL_PROM_TEXTFILE: /var/lib/sentinel-metrics/sentinel.prom
    volumes:
      - sentinel-metrics:/var/lib/sentinel-metrics
    command: ["python", "-u", "/app/demo/demo_app.py"]

volumes:
  sentinel-metrics:
