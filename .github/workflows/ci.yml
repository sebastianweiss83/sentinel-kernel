name: CI

on:
  push:
    branches: [main]
    tags-ignore: ['**']       # NEVER trigger on tags — Release workflow owns those
  pull_request:
    branches: [main]
  workflow_dispatch:

# Serialise sync-all + Pages deploys on main so two rapid pushes can't
# race. PRs get their own concurrency group per branch so they don't
# block main.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --cov=sentinel --cov-report=term-missing --cov-fail-under=75

  sovereignty-check:
    name: Sovereignty checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Check no US-owned deps in critical path
        run: python scripts/check_sovereignty.py

      - name: Verify EU AI Act mandatory trace fields present
        run: pytest tests/test_eu_ai_act_fields.py -v

      - name: Verify trace schema stability
        run: pytest tests/test_trace_schema.py -v

  manifesto-checks:
    name: "Manifesto — 5 sovereignty theses"
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
          cache-dependency-path: pyproject.toml
      - run: pip install -e ".[dev]"

      - name: "Thesis 1 — No US-owned dep in critical path"
        run: python scripts/check_sovereignty.py

      - name: "Thesis 2 — Air-gap: full critical path works offline"
        run: pytest tests/test_airgap.py -v
        env:
          SENTINEL_AIRGAP: "1"

      - name: "Thesis 3 — Apache 2.0 enforced (no proprietary core dep)"
        run: python scripts/check_license.py

      - name: "Thesis 4 — Sentinel passes its own sovereignty manifesto"
        run: python scripts/check_manifesto.py

      - name: "Thesis 5 — Trace immutability: no UPDATE/DELETE in storage"
        run: pytest tests/ -k "immut or append_only or no_update or no_delete" -v

  lint:
    name: Lint & type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
          cache-dependency-path: pyproject.toml
      - run: pip install -e ".[dev]"
      - run: ruff check sentinel/ tests/ scripts/
      - run: mypy sentinel/ --ignore-missing-imports

  quickstart:
    name: Quickstart smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
          cache-dependency-path: pyproject.toml
      - run: pip install -e .
      # pytest-xdist is required because pyproject.toml sets
      # `addopts = "-n auto ..."` — step 40 of smoke_test.py shells
      # out to `pytest tests/` and would otherwise fail with an
      # unrecognized argument.
      - run: pip install ruff pytest pytest-asyncio pytest-cov pytest-xdist
      - run: python examples/01_minimal_trace.py
      - run: python examples/03_policy_simple_rule.py
      - run: python examples/smoke_test.py

  airgap:
    name: Air-gapped validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
          cache-dependency-path: pyproject.toml
      - run: pip install -e ".[dev]"
      - name: Run air-gapped tests
        run: pytest tests/test_airgap.py -v
        env:
          SENTINEL_AIRGAP: "1"

  sync-all:
    # Regenerates every auto-generated content target from the current
    # repo state and commits any drift. Also uploads the GitHub Pages
    # artifact so the preview site always reflects the push that
    # triggered this run.
    #
    # Targets (see scripts/sync_all.py):
    #   - CLAUDE.md                   (ground truth for Claude Code)
    #   - README.md                   (badges between SYNC_ALL markers)
    #   - docs/project-status.md      (full current state)
    #   - docs/preview/index.html     (GitHub Pages content)
    #
    # Uses [skip ci] on the self-commit so the push does not re-trigger
    # the workflow.
    name: Sync all derived content
    runs-on: ubuntu-latest
    needs: [test, sovereignty-check, manifesto-checks, lint, quickstart, airgap]
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      !contains(github.event.head_commit.message, '[skip ci]')
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Pull latest (avoid conflict with concurrent runs)
        run: |
          git pull --rebase origin main || (
            git checkout --ours CLAUDE.md \
              docs/preview/data.json \
              docs/preview/index.html \
              docs/preview/report.html \
              docs/project-status.md 2>/dev/null || true
            git add -A
            git rebase --continue || git rebase --skip
          )

      - name: Run sync_all
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/sync_all.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git diff --quiet && echo "Nothing to sync" && exit 0
          git add CLAUDE.md README.md \
                  docs/project-status.md \
                  docs/preview/
          git diff --staged --quiet && echo "Nothing staged" && exit 0
          git commit -m "chore(auto): sync all derived content [skip ci]"
          git push origin main

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/preview

  deploy-pages:
    # Deploys the freshly-synced preview to GitHub Pages. Runs after
    # sync-all so the deployed content is guaranteed to match the tip
    # of main within the same pipeline.
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [sync-all]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
