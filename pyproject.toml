[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "sentinel-kernel"
version = "0.1.0"
description = "EU-sovereign decision record layer for AI agents."
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.11"
keywords = [
    "AI", "agents", "sovereignty", "EU", "GDPR",
    "decision-trace", "audit", "middleware", "LLM",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Security",
]

# Zero hard dependencies — works out of the box
dependencies = []

[project.optional-dependencies]
# LangChain / LangGraph integration
langchain = ["langchain>=0.2", "langgraph>=0.1"]

# Anthropic integration
anthropic = ["anthropic>=0.25"]

# OpenAI integration
openai = ["openai>=1.0"]

# OPA-based policy evaluation
opa = []  # Requires OPA binary: https://www.openpolicyagent.org/

# PostgreSQL storage backend
postgres = ["asyncpg>=0.29", "psycopg2-binary>=2.9"]

# OpenTelemetry export
otel = [
    "opentelemetry-api>=1.20",
    "opentelemetry-sdk>=1.20",
    "opentelemetry-exporter-otlp>=1.20",
]

# Development
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-cov>=4.0",
    "ruff>=0.3",
    "mypy>=1.9",
    "hatch>=1.9",
]

# CLI entry point — not yet implemented
# [project.scripts]
# sentinel = "sentinel.cli:main"

[project.urls]
Homepage = "https://github.com/sebastianweiss83/sentinel-kernel"
Documentation = "https://github.com/sebastianweiss83/sentinel-kernel/tree/main/docs"
Repository = "https://github.com/sebastianweiss83/sentinel-kernel"
Issues = "https://github.com/sebastianweiss83/sentinel-kernel/issues"
Changelog = "https://github.com/sebastianweiss83/sentinel-kernel/blob/main/CHANGELOG.md"

[tool.hatch.build.targets.wheel]
packages = ["sentinel"]

[tool.hatch.envs.default]
dependencies = [
    "sentinel-kernel[dev,anthropic,openai,langchain,otel]",
]

[tool.ruff]
line-length = 100
target-version = "py311"
exclude = [".venv", "dist", "build", ".ruff_cache", ".pytest_cache"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.11"
strict = true
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "--cov=sentinel --cov-report=term-missing"

[tool.coverage.run]
source = ["sentinel"]
omit = ["tests/*", "examples/*"]
