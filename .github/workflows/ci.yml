name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --cov=sentinel --cov-report=term-missing --cov-fail-under=75

  sovereignty-check:
    name: Sovereignty checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Check no US-owned deps in critical path
        run: python scripts/check_sovereignty.py

      - name: Verify EU AI Act mandatory trace fields present
        run: pytest tests/test_eu_ai_act_fields.py -v

      - name: Verify trace schema stability
        run: pytest tests/test_trace_schema.py -v

  lint:
    name: Lint & type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: ruff check sentinel/ tests/ scripts/
      - run: mypy sentinel/ --ignore-missing-imports

  quickstart:
    name: Quickstart smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .
      - run: pip install ruff pytest pytest-asyncio pytest-cov
      - run: python examples/minimal_trace.py
      - run: python examples/policy_deny.py
      - run: python examples/smoke_test.py

  airgap:
    name: Air-gapped validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Run air-gapped tests
        run: pytest tests/test_airgap.py -v
        env:
          SENTINEL_AIRGAP: "1"
