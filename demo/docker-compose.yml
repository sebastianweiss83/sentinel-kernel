name: sentinel-demo

services:

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: sentinel-otel
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus metrics exporter
    volumes:
      - "./otel-config.yaml:/etc/otelcol-contrib/config.yaml:ro"
    command: ["--config=/etc/otelcol-contrib/config.yaml"]

  langfuse-db:
    image: postgres:15-alpine
    container_name: sentinel-langfuse-db
    environment:
      POSTGRES_DB: langfuse
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
    volumes:
      - langfuse-db-data:/var/lib/postgresql/data

  langfuse:
    image: langfuse/langfuse:2
    container_name: sentinel-langfuse
    ports:
      - "3000:3000"
    depends_on:
      - langfuse-db
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      NEXTAUTH_SECRET: demo-only-do-not-use-in-production
      NEXTAUTH_URL: http://localhost:3000
      SALT: demo-only-do-not-use-in-production

  prometheus:
    image: prom/prometheus:latest
    container_name: sentinel-prometheus
    ports:
      - "9090:9090"
    volumes:
      - "./prometheus.yml:/etc/prometheus/prometheus.yml:ro"

  grafana:
    image: grafana/grafana:latest
    container_name: sentinel-grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: sentinel
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - "./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro"
      - "./grafana/datasources:/etc/grafana/provisioning/datasources:ro"
      - "./grafana/dashboard-json:/var/lib/grafana/dashboards:ro"

  sentinel-demo:
    build:
      context: ..
      dockerfile: demo/Dockerfile
    container_name: sentinel-demo-app
    depends_on:
      - otel-collector
    environment:
      OTEL_ENDPOINT: http://otel-collector:4317
      SENTINEL_PROJECT: sentinel-demo
    command: ["python", "-u", "/app/demo/demo_app.py"]

volumes:
  langfuse-db-data:
